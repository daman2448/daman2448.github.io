<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Finder - Find Free WiFi Hotspots Nearby</title>
    <meta name="description" content="Discover WiFi hotspots near you. Available on iOS and Android.">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #1976D2 0%, #0D47A1 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 400px; }
        .logo {
            width: 110px;
            height: 110px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 56px;
        }
        h1 { font-size: 36px; margin: 0 0 8px; }
        .tagline { opacity: 0.85; font-size: 16px; margin: 0 0 32px; }
        .btn {
            display: block;
            background: white;
            color: #1565C0;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            margin: 12px 0;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn-android { background: #34A853; color: white; }
        .footer { font-size: 13px; opacity: 0.7; margin-top: 24px; }
    </style>
    <script>
        // Auto-redirect based on platform
        (function() {
            const ua = navigator.userAgent || '';
            const isIOS = /iPad|iPhone|iPod/.test(ua);
            const isAndroid = /Android/i.test(ua);
            if (isIOS) {
                window.location.replace('https://apps.apple.com/app/id6761415389');
            } else if (isAndroid) {
                window.location.replace('https://play.google.com/store/apps/details?id=com.easyway.freewifi');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">📶</div>
        <h1>WiFi Finder</h1>
        <p class="tagline">Find WiFi hotspots nearby</p>
        <a href="https://apps.apple.com/app/id6761415389" class="btn">Download on the App Store</a>
        <a href="https://play.google.com/store/apps/details?id=com.easyway.freewifi" class="btn btn-android">Get it on Google Play</a>
        <p class="footer">Available on iOS and Android</p>
    </div>
</body>
</html>
